jwt:
  secret: "replace-with-32-byte-secret"
  expiration: 86400000

spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://db:3306/vocadb
    username: # 복사해서 여기에 붙여넣으세요
    password: # 복사해서 여기에 붙여넣으세요
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

